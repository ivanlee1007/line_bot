send_message:
  description: Send a notification. (https://github.com/ivanlee1007/line_bot#example)
  fields:
    to:
      description: A pre-authorized name of allowed_chat_ids to send the notification to.
      example: me
      required: false
      selector:
        text:
    chat_id:
      description: Raw LINE user/group/room id to send the notification to directly.
      example: C0bd3f7f1963a78c479b9170a238cbf6f
      required: false
      selector:
        text:
    reply_token:
      description: Reply token retrieved from webhook.
      required: false
      selector:
        text:
    message:
      description: Message Object (https://developers.line.biz/en/reference/messaging-api/#message-objects)
      example: '{"type": "text", "text": "Hello, world!"}'
      required: true
      selector:
        object:
send_button_message:
  description: Send a button notification. (https://github.com/ivanlee1007/line_bot#example-1)
  fields:
    to:
      description: A pre-authorized name of allowed_chat_ids to send the notification to.
      example: me
      required: false
      selector:
        text:
    chat_id:
      description: Raw LINE user/group/room id to send the notification to directly.
      example: C0bd3f7f1963a78c479b9170a238cbf6f
      required: false
      selector:
        text:
    reply_token:
      description: Reply token retrieved from webhook.
      required: false
      selector:
        text:
    text:
      description: Message body of the notification.
      example: What do you want to do?
      required: true
      selector:
        text:
    buttons:
      description: "A list of Actions Object (max: 4)"
      example: '[{"label": "Turn off the light", "text": "light off"}, {"label": "Buy", "data": "action=buy&itemid=111"}, {"uri": "https://www.google.com", "label": "Google"}]'
      default: []
      required: true
      selector:
        object:
send_confirm_message:
  description: Send a confirm notification. (https://github.com/ivanlee1007/line_bot#example-1)
  fields:
    to:
      description: A pre-authorized name of allowed_chat_ids to send the notification to.
      example: me
      required: false
      selector:
        text:
    chat_id:
      description: Raw LINE user/group/room id to send the notification to directly.
      example: C0bd3f7f1963a78c479b9170a238cbf6f
      required: false
      selector:
        text:
    reply_token:
      description: Reply token retrieved from webhook.
      required: false
      selector:
        text:
    text:
      description: Message body of the notification.
      example: Are you sure?
      required: true
      selector:
        text:
    alt_text:
      description: Alternative text shown on clients that do not render the template.
      example: Are you sure?
      required: false
      selector:
        text:
    buttons:
      description: "A list of Actions Object (max: 2)"
      example: '[{"text": "Yes", "data": "action=buy&itemid=111"}, {"text": "No"}]'
      default: []
      required: true
      selector:
        object:
list_chats:
  description: List currently registered chat aliases in the integration, optionally including raw chat_id values.
  fields:
    include_chat_id:
      description: Include raw LINE user/group/room ids in the response.
      example: true
      default: true
      required: false
      selector:
        boolean: